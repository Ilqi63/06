<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Table Rendering</title>
    <style>
        /* CSS: Memisahkan tampilan dari logika */
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h2>Data Mahasiswa (Render Otomatis)</h2>
    
    <table id="tabel-data">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
            </tr>
        </thead>
        <tbody id="body-tabel">
            </tbody>
    </table>

    <script>
        // 1. DATA (Modular: Data dipisah dari tampilan)
        const dataMahasiswa = [
            { id: 1, nama: "Satu" },
            { id: 2, nama: "Dua" },
            { id: 3, nama: "Tiga" },
            { id: 4, nama: "Empat" }
        ];

        // 2. FUNGSI RENDER (DRY & Reuse: Cukup tulis satu kali)
        // Fungsi ini bisa digunakan kembali untuk table lain
        function generateRows(items) {
            return items.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.nama}</td>
                </tr>
            `).join('');
        }

        // 3. EKSEKUSI (Scalable: Jika data bertambah, fungsi ini tetap sama)
        const container = document.getElementById('body-tabel');
        container.innerHTML = generateRows(dataMahasiswa);
    </script>
</body>
</html>
